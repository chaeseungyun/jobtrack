<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">JobTrack</h1>
    </header>

    <!-- 로딩 -->
    <section id="view-loading" class="view">
      <p class="text-muted">불러오는 중...</p>
      <p id="loading-hint" class="text-muted" hidden></p>
    </section>

    <!-- 로그인 필요 -->
    <section id="view-login" class="view" hidden>
      <div class="card">
        <p class="card-title">로그인이 필요합니다</p>
        <p id="login-notice" class="text-error" hidden></p>
        <p class="text-muted">JobTrack에 로그인하여 채용 공고를 저장하세요.</p>
        <button id="btn-login" class="btn btn-primary">JobTrack 로그인</button>
      </div>
    </section>

    <!-- 메인 (인증 완료) -->
    <section id="view-main" class="view" hidden>
      <div class="card">
        <p class="card-title">현재 페이지</p>
        <p id="current-url" class="text-url"></p>
        <p id="site-status" class="text-muted"></p>
      </div>
      <button id="btn-save" class="btn btn-primary" hidden>이 공고 저장하기</button>
      <p id="unsupported-msg" class="text-muted" hidden>지원하지 않는 사이트입니다. 사람인 또는 잡코리아 공고 페이지에서 사용해주세요.</p>
      <div class="actions">
        <button id="btn-logout" class="btn btn-secondary btn-sm">로그아웃</button>
      </div>
    </section>

    <!-- 확인 -->
    <section id="view-confirm" class="view" hidden>
      <div class="card">
        <p class="card-title">공고가 맞나요?</p>
        <p id="confirm-title" class="text-url"></p>
      </div>
      <button id="btn-confirm" class="btn btn-primary">맞아요</button>
      <button id="btn-other" class="btn btn-secondary">다른 공고</button>
    </section>

    <!-- 편집 폼 -->
    <section id="view-form" class="view" hidden>
      <div class="card form">
        <label class="form-field">
          <span class="form-label">회사명</span>
          <input id="field-company" type="text" class="form-input" />
        </label>
        <label class="form-field">
          <span class="form-label">포지션</span>
          <input id="field-position" type="text" class="form-input" />
        </label>
        <label class="form-field">
          <span class="form-label">경력</span>
          <select id="field-career-type" class="form-input">
            <option value="new">신입</option>
            <option value="experienced">경력</option>
            <option value="any">무관</option>
          </select>
        </label>
        <label class="form-field">
          <span class="form-label">마감일</span>
          <input id="field-deadline" type="date" class="form-input" />
        </label>
        <div class="form-field">
          <span class="form-label">출처</span>
          <span id="field-source-label" class="form-static"></span>
          <input id="field-source" type="hidden" />
        </div>
        <label class="form-field">
          <span class="form-label">공고 URL</span>
          <input id="field-url" type="url" class="form-input" readonly />
        </label>
        <p id="form-error" class="text-error" hidden></p>
      </div>
      <button id="btn-submit" class="btn btn-primary">저장</button>
      <button id="btn-cancel" class="btn btn-secondary">취소</button>
    </section>

    <!-- 성공 -->
    <section id="view-success" class="view" hidden>
      <div class="card">
        <p id="success-title" class="card-title">저장 완료!</p>
        <p id="success-message" class="text-muted">JobTrack에서 저장된 지원서를 확인할 수 있습니다.</p>
      </div>
      <a id="link-view" class="btn btn-primary" target="_blank" rel="noopener noreferrer">JobTrack에서 보기</a>
    </section>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
