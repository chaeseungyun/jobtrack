<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">JobTrack</h1>
    </header>

    <!-- 로딩 -->
    <section id="view-loading" class="view">
      <p class="text-muted">불러오는 중...</p>
    </section>

    <!-- 로그인 필요 -->
    <section id="view-login" class="view" hidden>
      <div class="card">
        <p class="card-title">로그인이 필요합니다</p>
        <p class="text-muted">JobTrack에 로그인하여 채용 공고를 저장하세요.</p>
        <button id="btn-login" class="btn btn-primary">JobTrack 로그인</button>
      </div>
    </section>

    <!-- 메인 (인증 완료) -->
    <section id="view-main" class="view" hidden>
      <div class="card">
        <p class="card-title">현재 페이지</p>
        <p id="current-url" class="text-url"></p>
        <p id="site-status" class="text-muted"></p>
      </div>
      <button id="btn-save" class="btn btn-primary" hidden>이 공고 저장하기</button>
      <p id="unsupported-msg" class="text-muted" hidden>지원하지 않는 사이트입니다. 사람인 또는 잡코리아 공고 페이지에서 사용해주세요.</p>
      <div class="actions">
        <button id="btn-logout" class="btn btn-secondary btn-sm">로그아웃</button>
      </div>
    </section>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
